    <!-- CONTACT SECTION -->
    <section class="contact-section">

        <div class="contact-card">

            <!-- LEFT SIDE -->
            <div class="contact-left">
                <h2>Get in Touch</h2>
                <p class="contact-subtitle">I’d love to hear from you!</p>

                <p class="contact-text">
                    If you have any inquiries, project ideas, or just want to say hi,
                    feel free to reach out using the form.
                </p>

                <p class="contact-email">
                    📧 saiprashanth.m.ramesh@gmail.com

                <p class="contact-email">

                <div class="social-links">

                    </a>
                </div>
            </div>

            <!-- RIGHT SIDE -->
            <form
  class="contact-form"
  id="contactForm"
  action="https://formspree.io/f/mregrkrv"
  method="POST"
>
  <div class="form-row">
    <input type="text" name="firstName" placeholder="First Name" required>
    <input type="text" name="lastName" placeholder="Last Name" required>
  </div>

  <input type="email" name="email" placeholder="Email" required>

  <textarea name="message" placeholder="Message" rows="5" required></textarea>

  <button type="submit">Send</button>
  <p class="form-status" id="formStatus"></p>
</form>



        </div>

    </section>

    <!-- HAMBURGER SCRIPT -->
    <script>
        const hamburger = document.querySelector(".hamburger");
        const sideMenu = document.querySelector(".side-menu");

        hamburger.addEventListener("click", () => {
            sideMenu.classList.toggle("active");
        });
    </script>

    <script>
  const form = document.getElementById("contactForm");
  const status = document.getElementById("formStatus");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = new FormData(form);

    try {
      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: {
          "Accept": "application/json"
        }
      });

      if (response.ok) {
        status.textContent = "✅ Message sent successfully!";
        status.style.color = "#22c55e";
        form.reset();
      } else {
        status.textContent = "❌ Something went wrong. Try again.";
        status.style.color = "#ef4444";
      }
    } catch (error) {
      status.textContent = "❌ Network error. Please try later.";
      status.style.color = "#ef4444";
    }
  });
</script>
